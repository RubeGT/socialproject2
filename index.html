<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Project 2</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #dcdde1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #subtitle-container {
            position: fixed;
            top: 40px;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 1000;
            pointer-events: none;
        }

        #subtitles {
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 12px 28px;
            border-radius: 30px;
            font-size: 1.1rem;
            opacity: 0;
            transition: opacity 0.4s ease;
            max-width: 70%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        #subtitles.show { opacity: 1; }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
        }

        button {
            padding: 10px 22px;
            cursor: pointer;
            background: #2f3640;
            border: none;
            color: white;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover { background: #57606f; }

        .human {
            position: absolute;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 11px;
            user-select: none;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            z-index: 5;
        }

        .human.selected { outline: 5px solid #0097e6; z-index: 10; }
        
        .human.thinking {
            animation: pulse 0.6s infinite alternate;
            box-shadow: 0 0 25px #f1c40f;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.15); }
        }

        .human.dragging {
            cursor: grabbing;
            animation: shake 0.1s infinite;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -2px); }
            100% { transform: translate(1px, -1px); }
        }

        #input-area {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: white;
            padding: 12px;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 100;
        }

        #user-input {
            border: none;
            outline: none;
            width: 350px;
            padding: 5px 10px;
            font-size: 16px;
        }

        #trash-can {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 70px;
            height: 70px;
            background: #c23616;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            transition: transform 0.2s;
            z-index: 100;
        }
        #trash-can.hovered { transform: scale(1.3); background: #eb4d4b; }
    </style>
</head>
<body>

<div id="subtitle-container">
    <div id="subtitles"></div>
</div>

<div id="ui">
    <button onclick="addHuman()">Add Human</button>
</div>

<div id="input-area">
    <input type="text" id="user-input" placeholder="Select a human, then type...">
    <button onclick="sendText()">Send</button>
</div>

<div id="trash-can">🗑️</div>

<script>
    const API_KEY = "AIzaSyAZT_FImb1IohN1F_MOcqdxBDU8eRxj0no";
    let humans = [];
    const names = ["Mark", "Sarah", "Leo", "Mia", "Dave", "Elena", "Chris", "Ruby", "James", "Lily"];
    const skinColors = ["#FFDBAC", "#F1C27D", "#E0AC69", "#8D5524", "#C68642"];
    
    let selectedHuman = null;

    window.onload = () => {
        const saved = localStorage.getItem('SocialProject2_Storage');
        if (saved) {
            try {
                JSON.parse(saved).forEach(h => createHumanElement(h));
            } catch(e) { console.warn("Could not load save."); }
        }
    };

    function save() {
        localStorage.setItem('SocialProject2_Storage', JSON.stringify(humans.map(h => ({
            name: h.name, color: h.color, x: h.x, y: h.y, memory: h.memory, pitch: h.pitch
        }))));
    }

    function addHuman() {
        createHumanElement({
            name: names[Math.floor(Math.random() * names.length)],
            color: skinColors[Math.floor(Math.random() * skinColors.length)],
            x: 150 + Math.random() * (window.innerWidth - 300),
            y: 150 + Math.random() * (window.innerHeight - 400),
            memory: [],
            pitch: 0.8 + Math.random() * 0.6
        });
        save();
    }

    function createHumanElement(data) {
        const el = document.createElement('div');
        el.className = 'human';
        el.style.backgroundColor = data.color;
        el.style.left = data.x + 'px';
        el.style.top = data.y + 'px';
        el.innerText = data.name;

        const obj = { ...data, element: el };
        humans.push(obj);
        document.body.appendChild(el);

        el.onmousedown = (e) => {
            if(selectedHuman) selectedHuman.element.classList.remove('selected');
            selectedHuman = obj;
            el.classList.add('selected');
            
            let ox = e.clientX - el.offsetLeft;
            let oy = e.clientY - el.offsetTop;

            document.onmousemove = (me) => {
                el.classList.add('dragging');
                obj.x = me.pageX - ox;
                obj.y = me.pageY - oy;
                el.style.left = obj.x + 'px';
                el.style.top = obj.y + 'px';

                const rect = document.getElementById('trash-can').getBoundingClientRect();
                if (me.pageX > rect.left && me.pageX < rect.right && me.pageY > rect.top && me.pageY < rect.bottom) {
                    document.getElementById('trash-can').classList.add('hovered');
                } else {
                    document.getElementById('trash-can').classList.remove('hovered');
                }
            };

            document.onmouseup = (me) => {
                document.onmousemove = null;
                el.classList.remove('dragging');
                const rect = document.getElementById('trash-can').getBoundingClientRect();
                if (me.pageX > rect.left && me.pageX < rect.right && me.pageY > rect.top && me.pageY < rect.bottom) {
                    obj.element.remove();
                    humans = humans.filter(h => h !== obj);
                    if(selectedHuman === obj) selectedHuman = null;
                    document.getElementById('trash-can').classList.remove('hovered');
                }
                save();
            };
        };
    }

    document.getElementById('user-input').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') sendText();
    });

    async function sendText() {
        const inputField = document.getElementById('user-input');
        const text = inputField.value.trim();
        if(!text || !selectedHuman) return;

        const target = selectedHuman;
        inputField.value = "";
        target.element.classList.add('thinking');

        try {
            const memoryText = target.memory.slice(-4).map(m => `${m.role}: ${m.text}`).join("\n");
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `You are ${target.name}. Use this memory: ${memoryText}. User said: "${text}". Reply with 1 short human sentence.` }] }]
                })
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error.message);
            }

            const data = await response.json();
            const reply = data.candidates[0].content.parts[0].text;

            target.memory.push({ role: "user", text: text }, { role: "model", text: reply });
            showSubtitles(target.name, reply);
            
            window.speechSynthesis.cancel();
            const speech = new SpeechSynthesisUtterance(reply);
            speech.pitch = target.pitch;
            window.speechSynthesis.speak(speech);
            
            save();
        } catch (e) {
            console.error(e);
            showSubtitles("SYSTEM", "Error: " + e.message);
        } finally {
            target.element.classList.remove('thinking');
        }
    }

    function showSubtitles(name, text) {
        const box = document.getElementById('subtitles');
        box.innerHTML = `<strong>${name}:</strong> ${text}`;
        box.classList.add('show');
        clearTimeout(window.subTimer);
        window.subTimer = setTimeout(() => box.classList.remove('show'), 5000);
    }
</script>
</body>
</html>
