<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Project 2</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            pointer-events: none;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            pointer-events: auto;
            background: #e94560;
            border: none;
            color: white;
            border-radius: 8px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        button:hover { background: #ff4d6d; }

        .human {
            position: absolute;
            width: 70px;
            height: 70px;
            border-radius: 20px;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            text-align: center;
            font-size: 11px;
            user-select: none;
            transition: transform 0.2s, outline 0.2s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            border: 2px solid rgba(255,255,255,0.2);
        }

        .human:hover {
            transform: scale(1.15) rotate(5deg);
            outline: 4px solid #00d2ff;
        }

        .human.selected {
            outline: 4px solid #f1c40f;
            box-shadow: 0 0 20px #f1c40f;
        }

        .human.dragging {
            cursor: grabbing;
            animation: shake 0.12s infinite;
            z-index: 1000;
        }

        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            25% { transform: translate(-2px, -3px) rotate(-2deg); }
            50% { transform: translate(-4px, 0px) rotate(2deg); }
            75% { transform: translate(4px, 3px) rotate(0deg); }
            100% { transform: translate(2px, -2px) rotate(-2deg); }
        }

        #status-bar {
            position: fixed;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 1.1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .memory-tag {
            font-size: 10px;
            position: absolute;
            bottom: -20px;
            color: #aaa;
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <h1>Social Project 2</h1>
    <button onclick="addHuman()">Add Human Instance</button>
    <p style="color: #00d2ff;">1. Click a human to select them.<br>2. Hold SPACE to talk.<br>3. Drag them to watch them shake.</p>
</div>

<div id="status-bar">Waiting for interaction...</div>

<script>
    const API_KEY = "AIzaSyAZT_FImb1IohN1F_MOcqdxBDU8eRxj0no";
    const humans = [];
    const names = ["Land", "Ocean", "River", "Dusty", "Sky", "Ash", "Blaze", "Echo", "Onyx", "Sage"];
    const skinColors = ["#FFDBAC", "#F1C27D", "#E0AC69", "#8D5524", "#C68642", "#D2B48C"];
    
    let selectedHuman = null;
    let isDragging = false;

    // --- INITIALIZE ---
    window.onload = () => {
        const saved = localStorage.getItem('socialProjectData_v2');
        if (saved) {
            const data = JSON.parse(saved);
            data.forEach(hData => createHumanElement(hData));
        }
    };

    function saveState() {
        const data = humans.map(h => ({
            name: h.name,
            color: h.color,
            x: h.x,
            y: h.y,
            memory: h.memory,
            pitch: h.pitch
        }));
        localStorage.setItem('socialProjectData_v2', JSON.stringify(data));
    }

    function addHuman() {
        const hData = {
            name: names[Math.floor(Math.random() * names.length)] + "-" + Math.floor(Math.random() * 999),
            color: skinColors[Math.floor(Math.random() * skinColors.length)],
            x: 100 + (Math.random() * (window.innerWidth - 200)),
            y: 100 + (Math.random() * (window.innerHeight - 200)),
            memory: [],
            pitch: 0.5 + (Math.random() * 1.2)
        };
        createHumanElement(hData);
        saveState();
    }

    function createHumanElement(data) {
        const el = document.createElement('div');
        el.className = 'human';
        el.style.backgroundColor = data.color;
        el.style.left = data.x + 'px';
        el.style.top = data.y + 'px';
        el.innerHTML = `<span>${data.name}</span><div class="memory-tag">Memories: ${data.memory.length}</div>`;

        const humanObj = { ...data, element: el };
        humans.push(humanObj);
        document.body.appendChild(el);

        // Interaction: Dragging
        el.onmousedown = (e) => {
            if(selectedHuman) selectedHuman.element.classList.remove('selected');
            selectedHuman = humanObj;
            el.classList.add('selected');
            
            isDragging = true;
            el.classList.add('dragging');
            
            let shiftX = e.clientX - el.getBoundingClientRect().left;
            let shiftY = e.clientY - el.getBoundingClientRect().top;

            function moveAt(pageX, pageY) {
                humanObj.x = pageX - shiftX;
                humanObj.y = pageY - shiftY;
                el.style.left = humanObj.x + 'px';
                el.style.top = humanObj.y + 'px';
            }

            function onMouseMove(e) { moveAt(e.pageX, e.pageY); }
            document.addEventListener('mousemove', onMouseMove);

            el.onmouseup = () => {
                document.removeEventListener('mousemove', onMouseMove);
                el.classList.remove('dragging');
                isDragging = false;
                saveState();
            };
        };

        el.onclick = () => {
            if(selectedHuman) selectedHuman.element.classList.remove('selected');
            selectedHuman = humanObj;
            el.classList.add('selected');
            updateStatus(`Target: ${humanObj.name}`);
        };
    }

    function updateStatus(txt) {
        document.getElementById('status-bar').innerText = txt;
    }

    // --- SPEECH RECOGNITION ---
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.continuous = false;
    
    document.addEventListener('keydown', (e) => {
        if (e.code === "Space" && selectedHuman && !isDragging) {
            try { recognition.start(); } catch(e) {}
            updateStatus("🎤 Listening to what you say to " + selectedHuman.name + "...");
        }
    });

    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        updateStatus(`You: "${transcript}"`);
        processAI(selectedHuman, transcript);
    };

    // --- GEMINI AI INTEGRATION ---
    async function processAI(human, userInput) {
        updateStatus(`${human.name} is thinking...`);
        
        // Build the prompt with history
        const historyContext = human.memory.map(m => `${m.role}: ${m.text}`).join("\n");
        
        const prompt = `You are a person named ${human.name} in a social experiment. 
        Your skin color is ${human.color}. You remember everything the user tells you.
        If the user threatens you, react with fear or defiance. 
        If the user is kind, be kind. Stay in character as a human.
        Current interaction history:
        ${historyContext}
        User says: "${userInput}"
        Respond shortly (1-2 sentences).`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });

            const data = await response.json();
            const aiText = data.candidates[0].content.parts[0].text;

            // Save to memory
            human.memory.push({ role: "User", text: userInput });
            human.memory.push({ role: "You", text: aiText });
            
            // Update UI memory tag
            human.element.querySelector('.memory-tag').innerText = `Memories: ${human.memory.length}`;
            
            updateStatus(`${human.name}: ${aiText}`);
            speak(aiText, human.pitch);
            saveState();

        } catch (error) {
            console.error("AI Error:", error);
            updateStatus("AI Error: Check console or API Key.");
        }
    }

    function speak(text, pitch) {
        window.speechSynthesis.cancel(); // Stop current speaking
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.pitch = pitch;
        utterance.rate = 1;
        window.speechSynthesis.speak(utterance);
    }
</script>

</body>
</html>
