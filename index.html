<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Project 2</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #e5e5e5;
            font-family: 'Segoe UI', sans-serif;
            color: #333;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            pointer-events: none;
        }

        button {
            padding: 12px 24px;
            cursor: pointer;
            pointer-events: auto;
            background: #222;
            border: none;
            color: white;
            border-radius: 6px;
            font-weight: bold;
        }

        .human {
            position: absolute;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 11px;
            user-select: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            border: 2px solid rgba(255,255,255,0.5);
            transition: outline 0.2s, box-shadow 0.3s;
        }

        .human.selected { outline: 4px solid #3498db; }

        .human.thinking {
            box-shadow: 0 0 25px #f1c40f;
            animation: pulse 0.8s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.15); }
        }

        .human.dragging {
            cursor: grabbing;
            animation: shake 0.1s infinite;
            z-index: 1000;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -2px); }
            100% { transform: translate(1px, -1px); }
        }

        #trash-can {
            position: fixed;
            bottom: 60px;
            right: 20px;
            width: 70px;
            height: 70px;
            background: #ff4757;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            transition: transform 0.2s;
        }

        #trash-can.hovered { transform: scale(1.3); background: red; }

        #status-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            padding: 10px;
            text-align: right;
            font-weight: bold;
            border-top: 1px solid #ccc;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div id="ui">
    <button onclick="addHuman()">Add Human</button>
    <p>1. Click human to select.<br>2. Press SPACE to <b>Start</b> talking.<br>3. Press SPACE again to <b>Stop/Send</b>.</p>
</div>

<div id="trash-can">🗑️</div>
<div id="status-bar">Status: Ready</div>

<script>
    const API_KEY = "AIzaSyAZT_FImb1IohN1F_MOcqdxBDU8eRxj0no";
    let humans = [];
    const names = ["James", "Mary", "Robert", "Patricia", "John", "Jennifer", "Michael", "Linda", "David", "Elizabeth"];
    const skinColors = ["#FFDBAC", "#F1C27D", "#E0AC69", "#8D5524", "#C68642"];
    
    let selectedHuman = null;
    let isDragging = false;
    let isListening = false;

    // --- SETUP ---
    window.onload = () => {
        const saved = localStorage.getItem('socialProject2_v5');
        if (saved) JSON.parse(saved).forEach(h => createHumanElement(h));
    };

    function save() {
        localStorage.setItem('socialProject2_v5', JSON.stringify(humans.map(h => ({
            name: h.name, color: h.color, x: h.x, y: h.y, memory: h.memory, pitch: h.pitch
        }))));
    }

    function addHuman() {
        const hData = {
            name: names[Math.floor(Math.random() * names.length)],
            color: skinColors[Math.floor(Math.random() * skinColors.length)],
            x: Math.random() * (window.innerWidth - 100),
            y: Math.random() * (window.innerHeight - 150),
            memory: [],
            pitch: 0.7 + (Math.random() * 0.6)
        };
        createHumanElement(hData);
        save();
    }

    function createHumanElement(data) {
        const el = document.createElement('div');
        el.className = 'human';
        el.style.backgroundColor = data.color;
        el.style.left = data.x + 'px';
        el.style.top = data.y + 'px';
        el.innerText = data.name;

        const obj = { ...data, element: el };
        humans.push(obj);
        document.body.appendChild(el);

        el.onmousedown = (e) => {
            if(selectedHuman) selectedHuman.element.classList.remove('selected');
            selectedHuman = obj;
            el.classList.add('selected');
            isDragging = true;
            el.classList.add('dragging');
            
            let ox = e.clientX - el.offsetLeft;
            let oy = e.clientY - el.offsetTop;

            document.onmousemove = (me) => {
                obj.x = me.pageX - ox;
                obj.y = me.pageY - oy;
                el.style.left = obj.x + 'px';
                el.style.top = obj.y + 'px';

                const rect = document.getElementById('trash-can').getBoundingClientRect();
                if (me.pageX > rect.left && me.pageX < rect.right && me.pageY > rect.top && me.pageY < rect.bottom) {
                    document.getElementById('trash-can').classList.add('hovered');
                } else {
                    document.getElementById('trash-can').classList.remove('hovered');
                }
            };

            document.onmouseup = (me) => {
                document.onmousemove = null;
                el.classList.remove('dragging');
                isDragging = false;
                const rect = document.getElementById('trash-can').getBoundingClientRect();
                if (me.pageX > rect.left && me.pageX < rect.right && me.pageY > rect.top && me.pageY < rect.bottom) {
                    obj.element.remove();
                    humans = humans.filter(h => h !== obj);
                    selectedHuman = null;
                }
                save();
            };
        };
    }

    // --- RECOGNITION (TOGGLE MODE) ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.continuous = true; 
    recognition.interimResults = true;

    document.onkeydown = (e) => {
        if (e.code === "Space" && selectedHuman && !isDragging) {
            if (!isListening) {
                recognition.start();
                isListening = true;
                document.getElementById('status-bar').innerText = "Status: Listening... (Press Space to Stop)";
            } else {
                recognition.stop();
                isListening = false;
                document.getElementById('status-bar').innerText = "Status: Sending to AI...";
            }
        }
    };

    recognition.onresult = (event) => {
        const transcript = Array.from(event.results)
            .map(result => result[0])
            .map(result => result.transcript)
            .join('');
        
        // If the user stops listening, process the final text
        if (!isListening) {
            getAIResponse(selectedHuman, transcript);
        }
    };

    recognition.onerror = (event) => {
        document.getElementById('status-bar').innerText = `Status: Mic Error (${event.error})`;
        isListening = false;
    };

    async function getAIResponse(human, input) {
        if (!input.trim()) return;
        human.element.classList.add('thinking');
        
        try {
            const history = human.memory.map(m => `${m.role}: ${m.text}`).slice(-4).join("\n");
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: `You are ${human.name}. Memory: ${history}. User says: ${input}. Respond in 1 short sentence.` }] }] })
            });

            const data = await response.json();
            const reply = data.candidates[0].content.parts[0].text;

            human.memory.push({ role: "User", text: input }, { role: "You", text: reply });
            document.getElementById('status-bar').innerText = `${human.name}: ${reply}`;
            
            window.speechSynthesis.cancel();
            const speech = new SpeechSynthesisUtterance(reply);
            speech.pitch = human.pitch;
            window.speechSynthesis.speak(speech);
            save();
        } catch (err) {
            document.getElementById('status-bar').innerText = "Status: AI Request Failed.";
        } finally {
            human.element.classList.remove('thinking');
        }
    }
</script>

</body>
</html>
