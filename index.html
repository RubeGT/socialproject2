<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Project 2</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #dcdde1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Subtitle System */
        #subtitle-container {
            position: fixed;
            top: 40px;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 1000;
            pointer-events: none;
        }

        #subtitles {
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 1.2rem;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            max-width: 80%;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #subtitles.show { opacity: 1; }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            background: #2f3640;
            border: none;
            color: white;
            border-radius: 5px;
            font-weight: bold;
        }

        /* Human Entities */
        .human {
            position: absolute;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 11px;
            user-select: none;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            transition: outline 0.2s;
        }

        .human.selected { outline: 5px solid #0097e6; }
        
        .human.thinking {
            animation: pulse 0.6s infinite alternate;
            box-shadow: 0 0 20px #f1c40f;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .human.dragging {
            cursor: grabbing;
            animation: shake 0.1s infinite;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -2px); }
            100% { transform: translate(1px, -1px); }
        }

        /* Controls */
        #input-area {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: white;
            padding: 10px;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        #user-input {
            border: none;
            outline: none;
            width: 300px;
            padding: 5px 15px;
            font-size: 16px;
        }

        #trash-can {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: #c23616;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            transition: transform 0.2s;
        }
        #trash-can.hovered { transform: scale(1.4); }
    </style>
</head>
<body>

<div id="subtitle-container">
    <div id="subtitles"></div>
</div>

<div id="ui">
    <button onclick="addHuman()">Add Human</button>
</div>

<div id="input-area">
    <input type="text" id="user-input" placeholder="Select a human and type here...">
    <button onclick="sendText()">Send</button>
</div>

<div id="trash-can">🗑️</div>

<script>
    const API_KEY = "AIzaSyAZT_FImb1IohN1F_MOcqdxBDU8eRxj0no";
    let humans = [];
    const names = ["Mark", "Sarah", "Leo", "Mia", "Dave", "Elena", "Chris", "Ruby"];
    const skinColors = ["#FFDBAC", "#F1C27D", "#E0AC69", "#8D5524", "#C68642"];
    
    let selectedHuman = null;

    window.onload = () => {
        const saved = localStorage.getItem('socialProject2_textMode');
        if (saved) JSON.parse(saved).forEach(h => createHumanElement(h));
    };

    function save() {
        localStorage.setItem('socialProject2_textMode', JSON.stringify(humans.map(h => ({
            name: h.name, color: h.color, x: h.x, y: h.y, memory: h.memory, pitch: h.pitch
        }))));
    }

    function addHuman() {
        createHumanElement({
            name: names[Math.floor(Math.random() * names.length)],
            color: skinColors[Math.floor(Math.random() * skinColors.length)],
            x: 100 + Math.random() * (window.innerWidth - 200),
            y: 100 + Math.random() * (window.innerHeight - 300),
            memory: [],
            pitch: 0.6 + Math.random() * 0.8
        });
        save();
    }

    function createHumanElement(data) {
        const el = document.createElement('div');
        el.className = 'human';
        el.style.backgroundColor = data.color;
        el.style.left = data.x + 'px';
        el.style.top = data.y + 'px';
        el.innerText = data.name;

        const obj = { ...data, element: el };
        humans.push(obj);
        document.body.appendChild(el);

        el.onmousedown = (e) => {
            if(selectedHuman) selectedHuman.element.classList.remove('selected');
            selectedHuman = obj;
            el.classList.add('selected');
            
            let ox = e.clientX - el.offsetLeft;
            let oy = e.clientY - el.offsetTop;

            document.onmousemove = (me) => {
                el.classList.add('dragging');
                obj.x = me.pageX - ox;
                obj.y = me.pageY - oy;
                el.style.left = obj.x + 'px';
                el.style.top = obj.y + 'px';

                const rect = document.getElementById('trash-can').getBoundingClientRect();
                if (me.pageX > rect.left && me.pageX < rect.right && me.pageY > rect.top && me.pageY < rect.bottom) {
                    document.getElementById('trash-can').classList.add('hovered');
                } else {
                    document.getElementById('trash-can').classList.remove('hovered');
                }
            };

            document.onmouseup = (me) => {
                document.onmousemove = null;
                el.classList.remove('dragging');
                const rect = document.getElementById('trash-can').getBoundingClientRect();
                if (me.pageX > rect.left && me.pageX < rect.right && me.pageY > rect.top && me.pageY < rect.bottom) {
                    obj.element.remove();
                    humans = humans.filter(h => h !== obj);
                    selectedHuman = null;
                }
                save();
            };
        };
    }

    // --- TEXT INTERACTION ---
    document.getElementById('user-input').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') sendText();
    });

    async function sendText() {
        const inputField = document.getElementById('user-input');
        const text = inputField.value.trim();
        if(!text || !selectedHuman) return;

        inputField.value = "";
        const target = selectedHuman;
        target.element.classList.
