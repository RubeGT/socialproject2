<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Project 2</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #e5e5e5;
            font-family: 'Segoe UI', sans-serif;
            color: #333;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            pointer-events: none;
        }

        button {
            padding: 12px 24px;
            cursor: pointer;
            pointer-events: auto;
            background: #222;
            border: none;
            color: white;
            border-radius: 6px;
            font-weight: bold;
        }

        .human {
            position: absolute;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 11px;
            user-select: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            border: 2px solid rgba(255,255,255,0.5);
            transition: outline 0.2s, box-shadow 0.3s;
        }

        .human.selected { outline: 4px solid #3498db; }

        /* New Thinking Animation */
        .human.thinking {
            box-shadow: 0 0 20px #f1c40f;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .human.dragging {
            cursor: grabbing;
            animation: shake 0.1s infinite;
            z-index: 1000;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -2px); }
            100% { transform: translate(1px, -1px); }
        }

        #trash-can {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 80px;
            height: 80px;
            background: #ff4757;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 30px;
            transition: transform 0.2s, background 0.2s;
        }

        #trash-can.hovered {
            transform: scale(1.3);
            background: #ff0000;
        }

        #status {
            position: fixed;
            bottom: 40px;
            width: 100%;
            text-align: center;
            font-weight: 600;
            background: rgba(255,255,255,0.8);
            padding: 5px 0;
        }
    </style>
</head>
<body>

<div id="ui">
    <button onclick="addHuman()">Add Human</button>
    <p>1. Click a human to select.<br>2. Tap SPACE once to start talking.</p>
</div>

<div id="status">Status: Ready</div>
<div id="trash-can">🗑️</div>

<script>
    const API_KEY = "AIzaSyAZT_FImb1IohN1F_MOcqdxBDU8eRxj0no";
    let humans = [];
    const humanNames = ["James", "Mary", "Robert", "Patricia", "John", "Jennifer", "Michael", "Linda", "David", "Elizabeth", "William", "Barbara", "Richard", "Susan", "Joseph", "Jessica"];
    const skinColors = ["#FFDBAC", "#F1C27D", "#E0AC69", "#8D5524", "#C68642"];
    
    let selectedHuman = null;
    let isDragging = false;

    window.onload = () => {
        const saved = localStorage.getItem('socialProject2_v4');
        if (saved) {
            JSON.parse(saved).forEach(h => createHumanElement(h));
        }
    };

    function save() {
        localStorage.setItem('socialProject2_v4', JSON.stringify(humans.map(h => ({
            name: h.name, color: h.color, x: h.x, y: h.y, memory: h.memory, pitch: h.pitch
        }))));
    }

    function addHuman() {
        const hData = {
            name: humanNames[Math.floor(Math.random() * humanNames.length)],
            color: skinColors[Math.floor(Math.random() * skinColors.length)],
            x: 150 + (Math.random() * (window.innerWidth - 300)),
            y: 150 + (Math.random() * (window.innerHeight - 300)),
            memory: [],
            pitch: 0.7 + (Math.random() * 0.6)
        };
        createHumanElement(hData);
        save();
    }

    function createHumanElement(data) {
        const el = document.createElement('div');
        el.className = 'human';
        el.style.backgroundColor = data.color;
        el.style.left = data.x + 'px';
        el.style.top = data.y + 'px';
        el.innerText = data.name;

        const obj = { ...data, element: el };
        humans.push(obj);
        document.body.appendChild(el);

        el.onmousedown = (e) => {
            if(selectedHuman) selectedHuman.element.classList.remove('selected');
            selectedHuman = obj;
            el.classList.add('selected');
            isDragging = true;
            el.classList.add('dragging');
            
            let ox = e.clientX - el.offsetLeft;
            let oy = e.clientY - el.offsetTop;

            const trash = document.getElementById('trash-can');

            document.onmousemove = (me) => {
                obj.x = me.pageX - ox;
                obj.y = me.pageY - oy;
                el.style.left = obj.x + 'px';
                el.style.top = obj.y + 'px';

                const rect = trash.getBoundingClientRect();
                if (me.pageX > rect.left && me.pageX < rect.right && me.pageY > rect.top && me.pageY < rect.bottom) {
                    trash.classList.add('hovered');
                } else {
                    trash.classList.remove('hovered');
                }
            };

            document.onmouseup = (me) => {
                document.onmousemove = null;
                el.classList.remove('dragging');
                isDragging = false;

                const rect = trash.getBoundingClientRect();
                if (me.pageX > rect.left && me.pageX < rect.right && me.pageY > rect.top && me.pageY < rect.bottom) {
                    deleteHuman(obj);
                    trash.classList.remove('hovered');
                }
                save();
            };
        };
    }

    function deleteHuman(obj) {
        obj.element.remove();
        humans = humans.filter(h => h !== obj);
        if (selectedHuman === obj) selectedHuman = null;
        save();
    }

    // --- RECOGNITION FIXES ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.continuous = false; // Stops after one sentence
    recognition.interimResults = false;

    document.onkeydown = (e) => {
        if (e.code === "Space" && selectedHuman && !isDragging) {
            try { 
                recognition.start(); 
                document.getElementById('status').innerText = "🎤 Status: Listening... (Stop talking to finish)";
            } catch(err) {
                // If already running, don't crash
            }
        }
    };

    // Fired as soon as the browser detects you stopped talking
    recognition.onspeechend = () => {
        recognition.stop();
        document.getElementById('status').innerText = "⌛ Status: Processing speech...";
    };

    recognition.onresult = (event) => {
        const text = event.results[0][0].transcript;
        document.getElementById('status').innerText = `You: "${text}"`;
        getAIResponse(selectedHuman, text);
    };

    recognition.onerror = (event) => {
        document.getElementById('status').innerText = "Status: Mic Error (" + event.error + ")";
    };

    async function getAIResponse(human, input) {
        // Visual feedback: Start glowing
        human.element.classList.add('thinking');
        document.getElementById('status').innerText = `${human.name} is thinking...`;
        
        const history = human.memory.map(m => `${m.role}: ${m.text}`).slice(-6).join("\n");
        const prompt = `Your name is ${human.name}. Character context: Standard human. 
        History: ${history}
        The user says: "${input}"
        Respond as a human in 1 short sentence.`;

        try {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const result = await response.json();
            const reply = result.candidates[0].content.parts[0].text;

            human.memory.push({ role: "User", text: input });
            human.memory.push({ role: "You", text: reply });
            
            document.getElementById('status').innerText = `${human.name}: ${reply}`;
            
            // TTS
            window.speechSynthesis.cancel();
            const speech = new SpeechSynthesisUtterance(reply);
            speech.pitch = human.pitch;
            window.speechSynthesis.speak(speech);

            save();
        } catch (err) {
            document.getElementById('status').innerText = "Status: AI Error. Check key/connection.";
        } finally {
            // Stop glowing
            human.element.classList.remove('thinking');
        }
    }
</script>

</body>
</html>
